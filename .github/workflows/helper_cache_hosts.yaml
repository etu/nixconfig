---
name: 'Workflow: Cache hosts 🔨🖥️'

'on':
  workflow_call:
    inputs:
      skipPush:
        required: false
        type: boolean
        default: false
      branch:
        required: false
        type: string
        default: ${{ github.ref }}
    secrets:
      CACHIX_AUTH_TOKEN:
        required: true

jobs:
  matrix:
    uses: ./.github/workflows/helper_host_matrix.yaml

  cache:
    needs: matrix
    runs-on: ubuntu-24.04
    strategy:
      matrix: ${{ fromJSON(needs.matrix.outputs.matrix) }}
    name: 'Cache ${{ matrix.hostname }} 🖥️'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch }}
      - uses: wimpysworld/nothing-but-nix@v10
      - uses: DeterminateSystems/nix-installer-action@v22
        with:
          nix-package-url: https://releases.nixos.org/nix/nix-2.31.3/nix-2.31.3-x86_64-linux.tar.xz
      - uses: cachix/cachix-action@v17
        with:
          name: etu
          extraPullNames: 'nix-community'
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipPush: ${{ inputs.skipPush }}

      - name: 'Build system 🔨🖥️'
        run: nix build -L ".#nixosConfigurations.${{ matrix.hostname }}.config.system.build.toplevel"
